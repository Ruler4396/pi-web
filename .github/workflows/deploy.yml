name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build SPA
        working-directory: spa
        run: |
          npm ci
          npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Build pi-web
        run: cargo build --release

      - name: Package artifacts
        run: |
          mkdir -p dist/pi-web
          cp target/release/pi-web dist/pi-web/
          cp -r spa/dist dist/pi-web/spa-dist/
          cd dist && tar czf ../pi-web.tar.gz pi-web/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi-web
          path: pi-web.tar.gz

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pi-web

      - name: Deploy to server
        if: ${{ secrets.DEPLOY_SSH_KEY != '' }}
        env:
          SSH_HOST: 8.138.1.39
          SSH_USER: root
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p /tmp/pi-deploy
          tar xzf pi-web.tar.gz -C /tmp/pi-deploy

          scp -o StrictHostKeyChecking=no \
            -r /tmp/pi-deploy/pi-web/* \
            ${SSH_USER}@${SSH_HOST}:/opt/pi/

          ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} << 'EOF'
            set -e
            if [ ! -f /opt/pi/pi ]; then
              echo "ERROR: /opt/pi/pi not found — build and deploy pi_agent_rust first"
              exit 1
            fi
            chmod +x /opt/pi/pi-web /opt/pi/pi
            systemctl daemon-reload
            systemctl restart pi-web || true
          EOF

          rm -rf /tmp/pi-deploy