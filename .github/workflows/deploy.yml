name: Build and Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install SPA dependencies
        working-directory: spa
        run: npm ci

      - name: Type check
        working-directory: spa
        run: npx tsc --noEmit

      - name: Build SPA
        working-directory: spa
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Build pi-web
        run: cargo build --release

      - name: Package artifacts
        run: |
          mkdir -p dist/pi-web
          cp target/release/pi-web dist/pi-web/
          cp -r spa/dist dist/pi-web/spa-dist/
          cd dist && tar czf ../pi-web.tar.gz pi-web/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi-web
          path: pi-web.tar.gz
