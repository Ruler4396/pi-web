name: Build and Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install SPA dependencies
        working-directory: spa
        run: npm ci

      - name: Type check
        working-directory: spa
        run: npx tsc --noEmit

      - name: Build SPA
        working-directory: spa
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Build pi-web
        run: cargo build --release

      - name: Package artifacts
        run: |
          mkdir -p dist/pi-web
          cp target/release/pi-web dist/pi-web/
          cp -r spa/dist dist/pi-web/spa-dist/
          cd dist && tar czf ../pi-web.tar.gz pi-web/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi-web
          path: pi-web.tar.gz

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: pi-web

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          if_key_exists: replace

      - name: Deploy to server
        run: |
          scp pi-web.tar.gz ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/pi-web.tar.gz
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
            set -e
            cd /tmp
            tar xzf pi-web.tar.gz
            cp pi-web/pi-web /opt/pi/pi-web
            chmod +x /opt/pi/pi-web
            rm -rf /opt/pi/spa-dist
            cp -r pi-web/spa-dist /opt/pi/spa-dist
            rm -rf pi-web pi-web.tar.gz
            systemctl restart pi-web
            sleep 2
            systemctl status pi-web --no-pager | head -5
          '
